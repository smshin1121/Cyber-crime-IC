<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}사이버범죄 국제공조 위키{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="top-nav">
    <div class="top-nav-inner">
      <a href="/" class="nav-logo">🌐 사이버범죄 국제공조 위키</a>
      <div class="nav-links">
        <a href="/category/operations">작전</a>
        <a href="/category/organizations">기관</a>
        <a href="/category/countries">국가</a>
        <a href="/category/legal-frameworks">법적 프레임워크</a>
        <a href="/category/mechanisms">메커니즘</a>
        <a href="/category/crime-types">범죄유형</a>
        <a href="/category/concepts">개념</a>
        <a href="/category/sources">출처</a>
        <a href="/stats">통계</a>
      </div>
      <form class="nav-search" action="/search" method="get">
        <input type="text" name="q" placeholder="위키 검색..." value="{{ request.args.get('q', '') }}">
        <button type="submit">검색</button>
      </form>
    </div>
  </nav>

  {% block body %}{% endblock %}

  <div class="footer">
    사이버범죄 국제공조 위키 &mdash; LLM Wiki Pattern &mdash;
    Powered by <a href="https://obsidian.md">Obsidian</a> + Flask &mdash;
    {{ now }} 기준 데이터
  </div>
</body>
</html>
