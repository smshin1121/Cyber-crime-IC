  <script>
  (function() {
    // Language toggle system — Korean default
    var STORAGE_KEY = 'wiki-lang';

    function getLang() {
      return localStorage.getItem(STORAGE_KEY) || 'ko';
    }

    function setLang(lang) {
      localStorage.setItem(STORAGE_KEY, lang);
      applyLang(lang);
    }

    function applyLang(lang) {
      var html = document.documentElement;
      html.classList.remove('lang-ko', 'lang-en');
      html.classList.add('lang-' + lang);
      html.setAttribute('lang', lang === 'ko' ? 'ko' : 'en');

      // Update i18n text content
      document.querySelectorAll('.i18n').forEach(function(el) {
        var text = el.getAttribute('data-' + lang);
        if (text) el.innerHTML = text;
      });

      // Update i18n placeholders
      document.querySelectorAll('.i18n-placeholder').forEach(function(el) {
        var text = el.getAttribute('data-' + lang);
        if (text) el.setAttribute('placeholder', text);
      });
    }

    // Toggle button
    var btn = document.getElementById('langToggle');
    if (btn) {
      btn.addEventListener('click', function() {
        var current = getLang();
        setLang(current === 'ko' ? 'en' : 'ko');
      });
    }

    // Apply saved language on load
    applyLang(getLang());
  })();
  </script>
