name: Deploy Cosmos

on:
  push:
    branches: [master]
    paths:
      - "wiki/**"
      - "cosmos/**"
      - ".github/workflows/deploy-cosmos.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r cosmos/requirements.txt
      - run: python cosmos/extract.py --verbose
      - name: Prepare Pages artifact
        run: |
          mkdir -p _site/cosmos
          cp -r docs/. _site/
          cp -r cosmos/. _site/cosmos/
          touch _site/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
