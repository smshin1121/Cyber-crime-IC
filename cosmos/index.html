<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cosmos of IC</title>
  <style>
    :root{--bg:#050816;--panel:rgba(8,12,28,.82);--line:rgba(255,255,255,.1);--text:#f4f1eb;--muted:rgba(244,241,235,.65);--accent:#fbbf24}
    *{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;color:var(--text);background:radial-gradient(circle at 20% 20%,rgba(96,165,250,.18),transparent 24%),radial-gradient(circle at 75% 15%,rgba(251,113,133,.14),transparent 22%),linear-gradient(180deg,#040610,#060816,#040610);font-family:"Noto Serif KR",system-ui,sans-serif}
    #app{display:grid;grid-template-columns:340px minmax(0,1fr) 380px;height:100%}.panel{overflow:auto;padding:18px;background:var(--panel);border-right:1px solid var(--line);backdrop-filter:blur(18px)}.right{border-right:0;border-left:1px solid var(--line)}#view{position:relative}#scene{width:100%;height:100%;display:block}
    .mono{font:11px/1.4 "JetBrains Mono",monospace;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}h1{margin:10px 0;font:700 40px/.95 Georgia,serif}
    .card{margin-top:12px;padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03)}.row{display:flex;gap:8px;flex-wrap:wrap}.title{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-weight:600;font-size:14px}
    input[type=search],select{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--text)}input[type=range]{width:100%;accent-color:var(--accent)}
    button{padding:9px 12px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--text);cursor:pointer}.active,.primary{background:rgba(251,191,36,.14);border-color:rgba(251,191,36,.35)}
    #badge{position:absolute;left:16px;top:16px;padding:10px 12px;border-radius:14px;background:rgba(8,12,28,.7);border:1px solid rgba(255,255,255,.1)}#stats{position:absolute;left:16px;right:16px;bottom:16px;display:flex;gap:8px;flex-wrap:wrap}.chip{padding:8px 10px;border-radius:999px;background:rgba(8,12,28,.7);border:1px solid rgba(255,255,255,.1);font-size:12px;color:var(--muted)}
    .hidden{display:none!important}.item{padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08);cursor:pointer}.meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.pill{display:inline-flex;gap:8px;align-items:center;margin:0 8px 8px 0;padding:8px 10px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);cursor:pointer}.sw{width:10px;height:10px;border-radius:50%;display:inline-block}
    @media (max-width:1100px){#app{grid-template-columns:1fr}.panel{max-height:34vh;border-right:0;border-bottom:1px solid var(--line)}.right{max-height:42vh;border-left:0;border-top:1px solid var(--line)}}
  </style>
</head>
<body>
<div id="app">
  <aside class="panel">
    <div class="mono">Cosmos of IC</div>
    <h1>국제공조의 우주</h1>
    <p style="color:var(--muted)">International Cooperation on Cyber Crime knowledge graph.</p>
    <section class="card"><div class="title"><span>Navigation & Filter</span><span id="stamp" class="mono">loading</span></div>
      <input id="search" type="search" placeholder="budapest, europol, korea"><div id="searchResults" class="hidden"></div>
      <div class="row" style="margin-top:10px"><button id="resetRoot" class="primary">Root Reset</button><button id="expand">Expand</button><button id="clearPath">Clear Path</button></div>
      <div style="margin-top:10px"><select id="pathTarget"><option value="">Choose destination node</option></select></div>
      <div id="typeFilters" style="display:grid;gap:8px;margin-top:10px"></div>
      <div class="title" style="margin-top:10px"><span>source_count</span><span id="sourceVal" class="mono">0</span></div><input id="sourceRange" type="range" min="0" max="10" value="0">
      <div class="title" style="margin-top:10px"><span>degree</span><span id="degreeVal" class="mono">0</span></div><input id="degreeRange" type="range" min="0" max="40" value="0">
      <div style="margin-top:10px"><select id="recent"><option value="all">All</option><option value="365">1 year</option><option value="180">6 months</option><option value="30">30 days</option></select></div>
      <label style="display:block;margin-top:10px"><input id="koreanOnly" type="checkbox"> Korean-relevant only</label>
    </section>
    <section class="card"><div class="title"><span>Theme</span></div><div id="themes" class="row"></div></section>
    <section class="card"><div class="title"><span>Layout</span></div><div class="row"><button class="layout active" data-layout="cluster">Cluster</button><button class="layout" data-layout="orbits">Orbits</button><button class="layout" data-layout="spiral">Spiral</button><button class="layout" data-layout="constellation">Constellation</button></div></section>
    <section class="card"><div class="title"><span>Motion</span><span id="motionVal" class="mono">0.35</span></div><input id="motion" type="range" min="0" max="1" step="0.01" value="0.35"></section>
    <section class="card"><div class="title"><span>Labels</span></div><div class="row"><button id="toggleLabels" class="active">Labels</button><button id="toggleGlow" class="active">Glow</button></div></section>
    <section class="card"><div class="title"><span>Export</span></div><div class="row"><button id="png">PNG</button><button id="json">JSON</button><button id="load">Load</button><button id="svg">SVG</button></div><input id="jsonInput" type="file" accept="application/json" class="hidden"></section>
    <section class="card"><div class="title"><span>Suggested Starts</span></div><div id="spotlights"></div></section>
  </aside>
  <main id="view"><canvas id="scene"></canvas><div id="badge"><div class="mono">Cosmos of IC</div><div id="rootBadge" style="margin-top:6px">Loading…</div></div><div id="stats"></div></main>
  <aside class="panel right"><div class="mono">Node Detail</div><div id="detail"><h2 style="margin:10px 0 8px;font:700 32px/1 Georgia,serif">Select a node</h2><p style="color:var(--muted)">Search, spotlight card, or graph click to open metadata.</p></div></aside>
</div>
<script id="graph-data" type="application/json">{"version":1,"nodes":[],"edges":[],"broken_links":[],"stats":{"total_nodes":0,"total_edges":0,"broken_links":0,"orphans":0,"by_type":{}}}</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const TYPES=["legal-framework","organization","country","operation","case","mechanism","procedure","crime-type","challenge","concept"], COLORS={"legal-framework":"#A78BFA",organization:"#34D399",country:"#60A5FA",operation:"#FBBF24",case:"#FB7185",mechanism:"#22D3EE",procedure:"#FB923C","crime-type":"#E879F9",challenge:"#F87171",concept:"#FFFFFF"}, THEMES={nebula:["#040610","#060816","#040610"],aurora:["#041019","#071520","#050a11"],ember:["#120707","#170d13","#09040a"],cobalt:["#04111d","#07131c","#03070c"],dusk:["#0c0815","#100b1a","#06040a"],monochrome:["#050505","#0b0b0b","#030303"]};
const S={data:null,map:new Map(),adj:new Map(),root:null,visible:new Set(),pathNodes:new Set(),pathEdges:new Set(),theme:"nebula",layout:"cluster",labels:true,glow:true,motion:.35,filters:{types:new Set(TYPES),minSource:0,minDegree:0,recent:"all",korean:false}};
const E={scene:scene,stamp,search,searchResults,resetRoot,expand,clearPath,pathTarget,typeFilters,sourceRange,sourceVal,degreeRange,degreeVal,recent,koreanOnly,themes,motion,motionVal,toggleLabels,toggleGlow,png,json,load,jsonInput,svg,spotlights,detail,rootBadge,stats};
const R=new THREE.WebGLRenderer({canvas:E.scene,antialias:true,alpha:true,preserveDrawingBuffer:true}), SCN=new THREE.Scene(), CAM=new THREE.PerspectiveCamera(55,1,.1,4000), EG=new THREE.Group(), NG=new THREE.Group(), LG=new THREE.Group(), RC=new THREE.Raycaster(), PT=new THREE.Vector2(), MES=[];
CAM.position.set(0,0,220); SCN.add(new THREE.AmbientLight(0xffffff,.82)); const DL=new THREE.DirectionalLight(0xffffff,.9); DL.position.set(20,30,60); SCN.add(DL); SCN.add(EG); SCN.add(NG); SCN.add(LG);
const tOf=n=>n.title_ko||n.title, cOf=t=>COLORS[t]||"#9ca3af", clean=t=>String(t||"").replace(/\s+/g," ").trim();
async function loadData(){try{const r=await fetch("./data.json"); if(!r.ok) throw 0; return await r.json();}catch{return JSON.parse(document.getElementById("graph-data").textContent||"{}");}}
const rootId=()=>[...S.data.nodes].sort((a,b)=>(b.degree||0)-(a.degree||0))[0]?.id||null, days=x=>{const d=new Date(x); return Number.isNaN(d.getTime())?1e9:(Date.now()-d.getTime())/864e5};
function pass(n){if(!S.filters.types.has(n.type)|| (n.source_count||0)<S.filters.minSource || (n.degree||0)<S.filters.minDegree) return false; if(S.filters.recent!=="all"&&days(n.updated)>Number(S.filters.recent)) return false; if(S.filters.korean&&!n.title_ko&&!/한국|대한민국|Korea/i.test(`${n.title||""} ${n.summary||""}`)) return false; return true;}
function build(){S.map=new Map(S.data.nodes.map(n=>[n.id,n])); S.adj=new Map(); S.data.nodes.forEach(n=>S.adj.set(n.id,new Set())); S.data.edges.forEach(e=>{S.adj.get(e.source)?.add(e.target); S.adj.get(e.target)?.add(e.source);});}
function visible(expand2=false){const root=S.root||rootId(), out=new Set([root]); (S.adj.get(root)||[]).forEach(x=>out.add(x)); if(expand2) [...out].forEach(id=>(S.adj.get(id)||[]).forEach(x=>out.add(x))); const f=new Set(); [...out].forEach(id=>{const n=S.map.get(id); if(n&&pass(n)) f.add(id);}); f.add(root); return f;}
function pos(ids){const p=new Map(), root=S.root||rootId(); p.set(root,new THREE.Vector3(0,0,0)); const others=[...ids].map(id=>S.map.get(id)).filter(Boolean).filter(n=>n.id!==root); if(S.layout==="cluster"){const groups=new Map(); others.forEach(n=>{if(!groups.has(n.type)) groups.set(n.type,[]); groups.get(n.type).push(n);}); [...groups.keys()].forEach((t,i)=>{const a=Math.PI*2*i/Math.max(groups.size,1), cx=Math.cos(a)*64, cy=Math.sin(a)*64, cz=(i%2?1:-1)*12; groups.get(t).forEach((n,j,arr)=>{const aa=Math.PI*2*j/Math.max(arr.length,1), r=18+(j%5)*4; p.set(n.id,new THREE.Vector3(cx+Math.cos(aa)*r,cy+Math.sin(aa)*r,cz+((j%3)-1)*6));});});} else if(S.layout==="orbits"){others.forEach((n,i)=>{const ring=1+Math.floor(i/12), a=Math.PI*2*i/Math.max(others.length,1); p.set(n.id,new THREE.Vector3(Math.cos(a)*ring*34,Math.sin(a)*ring*34,((i%7)-3)*6));});} else if(S.layout==="spiral"){others.forEach((n,i)=>{const a=i*.62,r=18+i*5.5; p.set(n.id,new THREE.Vector3(Math.cos(a)*r,Math.sin(a)*r*.72,((i%9)-4)*5));});} else {others.forEach((n,i)=>{const g=i*2.39996323,r=20+Math.sqrt(i+1)*18; p.set(n.id,new THREE.Vector3(Math.cos(g)*r,Math.sin(g)*r,((i%11)-5)*4));});} return p;}
function clear(g){while(g.children.length){const c=g.children.pop(); c.geometry&&c.geometry.dispose(); if(c.material){Array.isArray(c.material)?c.material.forEach(m=>m.dispose()):c.material.dispose(); c.material.map&&c.material.map.dispose();}}}
function label(text,color){const cv=document.createElement("canvas"),x=cv.getContext("2d"); cv.width=512; cv.height=128; x.font="600 34px Georgia"; x.fillStyle=color; x.shadowColor=color; x.shadowBlur=14; x.fillText(text.slice(0,24),18,72); const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,depthWrite:false})); sp.scale.set(54,13,1); return sp;}
function render(exp2=false){clear(EG); clear(NG); clear(LG); MES.length=0; S.visible=visible(exp2); const P=pos(S.visible), root=S.map.get(S.root||rootId()); S.data.edges.filter(e=>S.visible.has(e.source)&&S.visible.has(e.target)).forEach(e=>{const a=P.get(e.source),b=P.get(e.target); if(!a||!b) return; const hi=S.pathEdges.has(`${e.source}::${e.target}`)||S.pathEdges.has(`${e.target}::${e.source}`); EG.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints([a,b]),new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:hi?.95:.22})));}); [...S.visible].forEach(id=>{const n=S.map.get(id),p=P.get(id),r=id===(S.root||rootId())?6:Math.max(2.6,2+(n.degree||0)/12); const m=new THREE.Mesh(new THREE.SphereGeometry(r,18,18),new THREE.MeshStandardMaterial({color:cOf(n.type),emissive:cOf(n.type),emissiveIntensity:S.glow?(S.pathNodes.has(id)?.85:.24):0,roughness:.34,metalness:.16})); m.position.copy(p); m.userData.id=id; NG.add(m); MES.push(m); if(S.labels){const l=label(tOf(n),cOf(n.type)); l.position.copy(p.clone().add(new THREE.Vector3(0,r+6,0))); LG.add(l);}}); E.rootBadge.textContent=root?`${tOf(root)} · ${root.type} · degree ${root.degree||0}`:"No root"; E.stats.innerHTML=[`Visible nodes ${S.visible.size}`,`Visible edges ${S.data.edges.filter(e=>S.visible.has(e.source)&&S.visible.has(e.target)).length}`,`Broken refs ${S.data.stats?.broken_links||0}`,`Orphans ${S.data.stats?.orphans||0}`].map(t=>`<div class="chip">${t}</div>`).join(""); E.pathTarget.innerHTML=`<option value="">Choose destination node</option>`+[...S.visible].map(id=>S.map.get(id)).sort((a,b)=>tOf(a).localeCompare(tOf(b))).map(n=>`<option value="${n.id}">${tOf(n)}</option>`).join("");}
function rels(id){const g=new Map(); S.data.edges.forEach(e=>{if(e.source!==id&&e.target!==id) return; const other=S.map.get(e.source===id?e.target:e.source); if(!other) return; if(!g.has(e.kind)) g.set(e.kind,[]); g.get(e.kind).push(other);}); return g;}
function mdUrl(path){const host=location.host,parts=location.pathname.split("/").filter(Boolean); if(/github\.io$/i.test(host)&&parts.length) return `https://github.com/${host.split(".")[0]}/${parts[0]}/blob/master/${path}`; return `../${path}`;}
function show(id){const n=S.map.get(id); if(!n) return; const meta=Object.entries(n.meta||{}).map(([k,v])=>`<div class="card"><div class="mono">${k.replace(/_/g," ")}</div><div style="margin-top:6px">${Array.isArray(v)?v.join(", "):v}</div></div>`).join("")||`<div class="card"><div class="mono">meta</div><div class="muted" style="margin-top:6px">No mapped meta.</div></div>`; let rel=""; for(const [k,list] of rels(id).entries()) rel+=`<div class="card"><div class="mono">${k}</div><div style="margin-top:8px">${list.map(o=>`<span class="pill" data-id="${o.id}"><span class="sw" style="background:${cOf(o.type)}"></span>${tOf(o)}</span>`).join("")}</div></div>`; E.detail.innerHTML=`<div class="mono">${String(n.type).toUpperCase().replace(/-/g,"·")} · ${String(n.id).toUpperCase()}</div><h2 style="margin:10px 0 8px;font:700 32px/1 Georgia,serif">${n.title}${n.title_ko?`<br><span style="font-size:22px;color:var(--muted)">${n.title_ko}</span>`:""}</h2><p class="muted">${clean(n.summary)}</p><div class="row" style="margin:16px 0"><button id="focusBtn" class="primary">이 노드 중심으로</button><button id="expandBtn">2-hop 확장</button><button id="mdBtn">원본 md 열기</button></div><div class="meta">${meta}</div>${rel||`<div class="card">No visible relations.</div>`}`; document.getElementById("focusBtn").onclick=()=>{S.root=id;S.pathNodes.clear();S.pathEdges.clear();render(false)}; document.getElementById("expandBtn").onclick=()=>{S.root=id;render(true)}; document.getElementById("mdBtn").onclick=()=>window.open(mdUrl(n.path),"_blank","noopener"); E.detail.querySelectorAll(".pill").forEach(x=>x.onclick=()=>{path(id,x.dataset.id); show(x.dataset.id)}); S.pathNodes=new Set([id]); render(false);}
function path(a,b){const q=[[a]],seen=new Set([a]); let found=null; while(q.length){const p=q.shift(),cur=p[p.length-1]; if(cur===b){found=p;break} for(const nxt of S.adj.get(cur)||[]) if(!seen.has(nxt)){seen.add(nxt); q.push([...p,nxt])}} S.pathNodes=new Set(found||[]); S.pathEdges=new Set(); if(found) for(let i=0;i<found.length-1;i++) S.pathEdges.add(`${found[i]}::${found[i+1]}`); render(false);}
function searchFn(term){const q=term.toLowerCase(); return S.data.nodes.map(n=>{const hay=[n.title,n.title_ko,...(n.aliases||[])].filter(Boolean).join(" ").toLowerCase(); const s=hay.includes(q)?(String(n.title||"").toLowerCase().startsWith(q)?2:1):0; return {n,s};}).filter(x=>x.s).sort((a,b)=>b.s-a.s||(b.n.degree||0)-(a.n.degree||0)).slice(0,8).map(x=>x.n);}
function bind(){
  E.search.oninput=()=>{const t=E.search.value.trim(); if(!t){E.searchResults.classList.add("hidden"); E.searchResults.innerHTML=""; return} const rs=searchFn(t); E.searchResults.classList.remove("hidden"); E.searchResults.innerHTML=rs.map(n=>`<div class="item" data-id="${n.id}"><strong>${tOf(n)}</strong><div class="muted" style="font-size:12px">${n.type}</div></div>`).join("")||`<div class="muted">No match</div>`; E.searchResults.querySelectorAll(".item").forEach(x=>x.onclick=()=>{S.root=x.dataset.id; render(false); show(x.dataset.id); E.searchResults.classList.add("hidden")})};
  E.resetRoot.onclick=()=>{S.root=rootId(); S.pathNodes.clear(); S.pathEdges.clear(); render(false)}; E.expand.onclick=()=>render(true); E.clearPath.onclick=()=>{S.pathNodes.clear(); S.pathEdges.clear(); render(false)};
  E.pathTarget.onchange=()=>{if(E.pathTarget.value&&S.root) path(S.root,E.pathTarget.value)};
  E.sourceRange.oninput=()=>{S.filters.minSource=+E.sourceRange.value; E.sourceVal.textContent=E.sourceRange.value; render(false)}; E.degreeRange.oninput=()=>{S.filters.minDegree=+E.degreeRange.value; E.degreeVal.textContent=E.degreeRange.value; render(false)};
  E.recent.onchange=()=>{S.filters.recent=E.recent.value; render(false)}; E.koreanOnly.onchange=()=>{S.filters.korean=E.koreanOnly.checked; render(false)};
  document.querySelectorAll(".layout").forEach(b=>b.onclick=()=>{S.layout=b.dataset.layout; document.querySelectorAll(".layout").forEach(x=>x.classList.remove("active")); b.classList.add("active"); render(false)});
  E.motion.oninput=()=>{S.motion=+E.motion.value; E.motionVal.textContent=(+E.motion.value).toFixed(2)}; E.toggleLabels.onclick=()=>{S.labels=!S.labels; E.toggleLabels.classList.toggle("active",S.labels); render(false)}; E.toggleGlow.onclick=()=>{S.glow=!S.glow; E.toggleGlow.classList.toggle("active",S.glow); render(false)};
  E.png.onclick=()=>{const a=document.createElement("a"); a.href=R.domElement.toDataURL("image/png"); a.download="cosmos-of-ic.png"; a.click()}; E.json.onclick=()=>{const blob=new Blob([JSON.stringify({root:S.root,visibleNodeIds:[...S.visible],filters:{...S.filters,types:[...S.filters.types]},theme:S.theme,layout:S.layout},null,2)],{type:"application/json"}),u=URL.createObjectURL(blob),a=document.createElement("a"); a.href=u; a.download="cosmos-state.json"; a.click(); URL.revokeObjectURL(u)};
  E.load.onclick=()=>E.jsonInput.click(); E.jsonInput.onchange=async()=>{const f=E.jsonInput.files?.[0]; if(!f) return; const s=JSON.parse(await f.text()); S.root=s.root||rootId(); S.layout=s.layout||S.layout; if(s.filters){S.filters.minSource=s.filters.minSource||0; S.filters.minDegree=s.filters.minDegree||0; S.filters.recent=s.filters.recent||"all"; S.filters.korean=!!s.filters.korean; S.filters.types=new Set(s.filters.types||TYPES)} buildType(); render(false)};
  E.svg.onclick=()=>{const size=1200, list=MES.map(m=>({id:m.userData.id,x:m.position.x+size/2,y:m.position.y+size/2,r:m.geometry.parameters.radius*1.2,c:`#${m.material.color.getHexString()}`})); const lines=S.data.edges.filter(e=>S.visible.has(e.source)&&S.visible.has(e.target)).map(e=>{const a=list.find(x=>x.id===e.source),b=list.find(x=>x.id===e.target); return !a||!b?"":`<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" stroke="rgba(255,255,255,.24)" stroke-width="1"/>`;}).join(""); const circles=list.map(n=>`<circle cx="${n.x}" cy="${n.y}" r="${n.r}" fill="${n.c}"/>`).join(""); const u=URL.createObjectURL(new Blob([`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="background:#050816">${lines}${circles}</svg>`],{type:"image/svg+xml"})),a=document.createElement("a"); a.href=u; a.download="cosmos-of-ic.svg"; a.click(); URL.revokeObjectURL(u)};
}
function buildType(){const counts={}; S.data.nodes.forEach(n=>counts[n.type]=(counts[n.type]||0)+1); E.typeFilters.innerHTML=TYPES.map(t=>`<label style="display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center"><input type="checkbox" data-type="${t}" ${S.filters.types.has(t)?"checked":""}><span><span class="sw" style="background:${cOf(t)};box-shadow:0 0 10px ${cOf(t)};margin-right:8px"></span>${t}</span><span class="mono">${counts[t]||0}</span></label>`).join(""); E.typeFilters.querySelectorAll("input").forEach(x=>x.onchange=()=>{x.checked?S.filters.types.add(x.dataset.type):S.filters.types.delete(x.dataset.type); render(false)})}
function buildThemes(){E.themes.innerHTML=Object.keys(THEMES).map(n=>`<button class="${n===S.theme?"active":""}" data-theme="${n}">${n}</button>`).join(""); E.themes.querySelectorAll("button").forEach(b=>b.onclick=()=>{S.theme=b.dataset.theme; document.querySelectorAll("#themes button").forEach(x=>x.classList.remove("active")); b.classList.add("active"); const [a,c,d]=THEMES[S.theme]; document.documentElement.style.setProperty("--bg",a); document.body.style.background=`radial-gradient(circle at 20% 20%,rgba(96,165,250,.18),transparent 24%),radial-gradient(circle at 75% 15%,rgba(251,113,133,.14),transparent 22%),linear-gradient(180deg,${a},${c},${d})`;})}
function buildSpot(){const seen=new Set(), picks=[...S.data.nodes].sort((a,b)=>(b.degree||0)-(a.degree||0)).filter(n=>{if(seen.has(n.type)&&seen.size<8) return false; seen.add(n.type); return true}).slice(0,6); E.spotlights.innerHTML=picks.map(n=>`<div class="item" data-id="${n.id}"><div class="mono">${n.type}</div><div style="font-weight:700">${tOf(n)}</div><div class="muted" style="font-size:12px">degree ${n.degree||0} · sources ${n.source_count||0}</div></div>`).join(""); E.spotlights.querySelectorAll(".item").forEach(x=>x.onclick=()=>{S.root=x.dataset.id; render(false); show(x.dataset.id)})}
function resize(){const w=view.clientWidth,h=view.clientHeight; R.setSize(w,h,false); R.setPixelRatio(Math.min(devicePixelRatio,2)); CAM.aspect=w/h; CAM.updateProjectionMatrix()}
function click(ev){const r=R.domElement.getBoundingClientRect(); PT.x=((ev.clientX-r.left)/r.width)*2-1; PT.y=-((ev.clientY-r.top)/r.height)*2+1; RC.setFromCamera(PT,CAM); const hit=RC.intersectObjects(MES)[0]; if(hit) show(hit.object.userData.id)}
function loop(){requestAnimationFrame(loop); NG.rotation.y+=.0016*S.motion; EG.rotation.y+=.0012*S.motion; LG.rotation.y+=.0016*S.motion; R.render(SCN,CAM)}
async function init(){S.data=await loadData(); build(); S.root=rootId(); E.stamp.textContent=S.data.generated_at||"local"; buildType(); buildThemes(); buildSpot(); bind(); resize(); render(false); if(S.root) show(S.root); loop()}
window.addEventListener("resize",resize); R.domElement.addEventListener("click",click); init();
</script>
</body>
